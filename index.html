<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Duelos Mitos y Leyendas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">

    <section class="player-area top">
      <div class="player-card" id="playerTopCard">
        <div class="player-header-row">
          <div class="player-header">
            <input
              type="text"
              id="playerTopName"
              class="player-name"
              value="Jugador Arriba"
              maxlength="30"
            />
          </div>

          <div class="dice-widget">
            <p class="dice-title">D20</p>
            <div class="dice-display small" id="topDiceDisplay">
              <span class="dice-shape"></span>
              <span class="dice-value" id="topDiceValue">-</span>
            </div>
            <button id="rollTopDice" class="dice-button small">Lanzar</button>
          </div>
        </div>

        <div class="player-options">
          <label for="playerTopMat" class="mat-label">Playmat</label>
          <select id="playerTopMat" class="mat-select">
            <option value="playmat1.jpg">Playmat 1</option>
            <option value="playmat2.jpg">Playmat 2</option>
            <option value="playmat3.jpg">Playmat 3</option>
            <option value="playmat4.jpg">Playmat 4</option>
          </select>
        </div>

        <div class="castle-box">
          <p class="label">Castillo</p>
          <div class="castle-count" id="playerTopCastle">50</div>
          <p class="sub-label">
            Inicial:
            <input
              type="number"
              id="playerTopInitial"
              class="initial-input"
              value="50"
              min="0"
            />
          </p>
        </div>

        <div class="damage-panel">
          <p class="label">Atacar rival</p>

          <div class="quick-buttons">
            <button data-attacker="top" data-damage="10">-10</button>
            <button data-attacker="top" data-damage="20">-20</button>
            <button data-attacker="top" data-damage="30">-30</button>
            <button data-attacker="top" data-damage="50">-50</button>
          </div>

          <div class="manual-damage">
            <input
              type="number"
              id="damageTopInput"
              placeholder="Daño"
              min="0"
            />
            <button id="applyTopDamage">Aplicar</button>
          </div>
        </div>
      </div>
    </section>

    <section class="center-bar">
      <div class="center-content">
        <h1>Duelos Mitos y Leyendas</h1>
        <div class="center-actions">
          <button id="resetMatch">Reiniciar duelo</button>
        </div>
      </div>
    </section>

    <section class="player-area bottom">
      <div class="player-card" id="playerBottomCard">
        <div class="player-header-row">
          <div class="player-header">
            <input
              type="text"
              id="playerBottomName"
              class="player-name"
              value="Jugador Abajo"
              maxlength="30"
            />
          </div>

          <div class="dice-widget">
            <p class="dice-title">D20</p>
            <div class="dice-display small" id="bottomDiceDisplay">
              <span class="dice-shape"></span>
              <span class="dice-value" id="bottomDiceValue">-</span>
            </div>
            <button id="rollBottomDice" class="dice-button small">Lanzar</button>
          </div>
        </div>

        <div class="player-options">
          <label for="playerBottomMat" class="mat-label">Playmat</label>
          <select id="playerBottomMat" class="mat-select">
            <option value="playmat1.jpg">Playmat 1</option>
            <option value="playmat2.jpg">Playmat 2</option>
            <option value="playmat3.jpg">Playmat 3</option>
            <option value="playmat4.jpg">Playmat 4</option>
          </select>
        </div>

        <div class="castle-box">
          <p class="label">Castillo</p>
          <div class="castle-count" id="playerBottomCastle">50</div>
          <p class="sub-label">
            Inicial:
            <input
              type="number"
              id="playerBottomInitial"
              class="initial-input"
              value="50"
              min="0"
            />
          </p>
        </div>

        <div class="damage-panel">
          <p class="label">Atacar rival</p>

          <div class="quick-buttons">
            <button data-attacker="bottom" data-damage="10">-10</button>
            <button data-attacker="bottom" data-damage="20">-20</button>
            <button data-attacker="bottom" data-damage="30">-30</button>
            <button data-attacker="bottom" data-damage="50">-50</button>
          </div>

          <div class="manual-damage">
            <input
              type="number"
              id="damageBottomInput"
              placeholder="Daño"
              min="0"
            />
            <button id="applyBottomDamage">Aplicar</button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
